name: ML Training Workflow

on:
  push:
    branches: [ main ]

jobs:
  train-model:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run training script
      run: |
        python src/train.py

    - name: Display Results
      run: |
        echo "## ML Experiment Results" >> $GITHUB_STEP_SUMMARY
        echo "Name: Panduga Maheswar Reddy" >> $GITHUB_STEP_SUMMARY
        echo "Roll Number: 2022BCS0185" >> $GITHUB_STEP_SUMMARY
        cat outputs/results.json >> $GITHUB_STEP_SUMMARY

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ml-results
        path: outputs/